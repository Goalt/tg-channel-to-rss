name: Docker image publish

on:
  push:
    branches:
      - master

jobs:
  docker-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tg-channel-to-rss:ci .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          set -euo pipefail
          image_repo="$(echo "$IMAGE_REPO" | tr '[:upper:]' '[:lower:]')"
          docker tag tg-channel-to-rss:ci "$image_repo:latest"
          docker tag tg-channel-to-rss:ci "$image_repo:${GITHUB_SHA}"
          docker push "$image_repo:latest"
          docker push "$image_repo:${GITHUB_SHA}"
