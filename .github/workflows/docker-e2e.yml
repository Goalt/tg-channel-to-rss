name: Docker build and e2e

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build-and-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SERVICE_URL: http://127.0.0.1:8000
      TEST_API_KEY: test-key
      WAIT_SECONDS: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tg-channel-to-rss:ci .

      - name: Start container
        run: |
          docker run -d --rm \
            --name tg-channel-to-rss-ci \
            -p 8000:8000 \
            -e API_KEY="$TEST_API_KEY" \
            tg-channel-to-rss:ci

      - name: Wait for service
        run: |
          for _ in $(seq 1 "$WAIT_SECONDS"); do
            status="$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/feed/abcde?key=wrong")"
            if [ "$status" = "401" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "Service did not start in time"
          docker logs tg-channel-to-rss-ci || true
          exit 1

      - name: E2E test: unauthorized request
        run: |
          status="$(curl -s -o /tmp/body-unauthorized.txt -w "%{http_code}" "$SERVICE_URL/feed/abcde?key=wrong")"
          test "$status" = "401"
          grep -q "Unauthorized" /tmp/body-unauthorized.txt

      - name: E2E test: invalid channel validation
        run: |
          status="$(curl -s -o /tmp/body-invalid-channel.txt -w "%{http_code}" "$SERVICE_URL/feed/ab?key=$TEST_API_KEY")"
          test "$status" = "400"
          grep -q "Invalid channel_name" /tmp/body-invalid-channel.txt

      - name: Stop container
        if: always()
        run: docker stop tg-channel-to-rss-ci
