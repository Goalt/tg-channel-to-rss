name: Docker build and e2e

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  docker-build-and-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SERVICE_URL: http://127.0.0.1:8000
      TEST_VALID_CHANNEL_NAME: testch1
      TEST_INVALID_CHANNEL_NAME: ab
      MAX_RETRIES: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tg-channel-to-rss:ci .

      - name: Start container
        run: |
          docker run -d --rm \
            --name tg-channel-to-rss-ci \
            -p 8000:8000 \
            tg-channel-to-rss:ci

      - name: Wait for service
        run: |
          attempt=0
          while [ "$attempt" -lt "$MAX_RETRIES" ]; do
            status="$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/feed/$TEST_INVALID_CHANNEL_NAME" || true)"
            status="${status:-000}"
            if [ "$status" = "400" ]; then
              exit 0
            fi
            attempt=$((attempt + 1))
            sleep 1
          done
          echo "Service did not start in time"
          docker logs tg-channel-to-rss-ci || true
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: docker logs tg-channel-to-rss-ci || true

      - name: "E2E test: no authorization required"
        run: |
          status="$(curl -s -o /tmp/body-no-auth.txt -w "%{http_code}" "$SERVICE_URL/feed/$TEST_VALID_CHANNEL_NAME")"
          test "$status" != "401"
          ! grep -q "Unauthorized" /tmp/body-no-auth.txt

      - name: "E2E test: invalid channel validation"
        run: |
          status="$(curl -s -o /tmp/body-invalid-channel.txt -w "%{http_code}" "$SERVICE_URL/feed/$TEST_INVALID_CHANNEL_NAME")"
          test "$status" = "400"
          grep -q "Invalid channel_name" /tmp/body-invalid-channel.txt

      - name: Stop container
        if: always()
        run: docker stop tg-channel-to-rss-ci || true
